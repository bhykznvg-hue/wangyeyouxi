<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深夜回廊 · MIDNIGHT CORRIDOR</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%23050807'/><rect x='6' y='3' width='4' height='10' fill='%237a9b8e'/></svg>">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="game-canvas"></canvas>

<!-- CRT 叠加层 -->
<div id="crt-overlay"></div>
<div id="crt-curve"></div>

<!-- ============ 标题画面 ============ -->
<div id="title-screen">
  <div class="title-noise"></div>
  <div class="title-content">
    <div class="title-jp">深夜回廊</div>
    <div class="title-en">— MIDNIGHT CORRIDOR —</div>
    <div class="title-sub">第一人称心理恐怖 · 低模复古</div>
    <div class="title-menu">
      <button id="btn-start" class="t-btn">▸ 開始</button>
      <button id="btn-how" class="t-btn">▸ 操作説明</button>
    </div>
    <div class="title-warn">建议佩戴耳机 · 关灯游玩<br>本作不含血腥画面 · 含突发音效与闪烁光效</div>
  </div>
  <div id="how-panel" class="hidden">
    <div class="how-title">// 操作説明</div>
    <div class="how-grid">
      <div><b>W A S D</b>移动</div>
      <div><b>鼠标</b>视角</div>
      <div><b>Shift</b>奔跑（会发出声音）</div>
      <div><b>E</b>调查 / 开门 / 拾取</div>
      <div><b>F</b>手电筒</div>
      <div><b>Esc</b>释放鼠标</div>
    </div>
    <div class="how-tip">走廊的规则并不总是相同。<br>留意墙上的纸符。</div>
    <button id="btn-how-close" class="t-btn">▸ 戻る</button>
  </div>
</div>

<!-- ============ HUD ============ -->
<div id="hud" class="hidden">
  <div id="rec-tag"><span class="rec-dot"></span>REC <span id="rec-time">00:00:00</span></div>
  <div id="objective"><span class="obj-tag">◆ 目標</span><span id="objective-text"></span></div>
  <div id="center-dot"></div>
  <div id="interact-tip" class="hidden"><span class="key">E</span><span id="interact-label"></span></div>
  <div id="battery"><div id="battery-fill"></div></div>
  <div id="subtitle"></div>
</div>

<!-- ============ 纸条阅读 ============ -->
<div id="note-screen" class="hidden">
  <div class="note-paper">
    <div id="note-text"></div>
    <div class="note-close">[ E ] 放下</div>
  </div>
</div>

<!-- ============ 被抓住 ============ -->
<div id="caught-screen" class="hidden">
  <div class="caught-static"></div>
  <div class="caught-text">信号中断</div>
  <div class="caught-sub">▶ PLAY</div>
</div>

<!-- ============ 结局 ============ -->
<div id="ending-screen" class="hidden">
  <div id="ending-text"></div>
</div>

<div id="fade-overlay"></div>

<script src="js/lib/three.min.js"></script>
<script src="js/audio.js"></script>
<script src="js/textures.js"></script>
<script src="js/world.js"></script>
<script src="js/player.js"></script>
<script src="js/monster.js"></script>
<script src="js/events.js"></script>
<script src="js/main.js"></script>
</body>
</html>
